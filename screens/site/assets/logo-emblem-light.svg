      <line x1="-14" y1="-127" x2="14" y2="-127"/>
      <line x1="-14" y1="-159" x2="14" y2="-159"/>
      <line x1="-14" y1="-191" x2="14" y2="-191"/>
      <line x1="-14" y1="-223" x2="14" y2="-223"/>
