      <ellipse cx="34" cy="-7" rx="11" ry="8" transform="rotate(-20 34 -7)"/>
      <rect x="7" y="-44" width="5" height="45" rx="2"/>
      <rect x="41" y="-51" width="5" height="45" rx="2"/>
      <path d="M 7,-44 L 46,-53 L 46,-41 L 7,-32 Z"/>
